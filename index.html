<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Badges Project</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body class="container mt-4">

  <h2 class="text-center mb-4">Bootstrap Badges Demo</h2>

  <!-- Headings -->
  <h4>Badges with Headings</h4>
  <h1>Heading <span class="badge badge-secondary">New</span></h1>
  <h3>Heading <span class="badge badge-success">Updated</span></h3>

  <hr>

  <!-- Contextual Colors -->
  <h4>Badge Colors</h4>
  <span class="badge badge-primary">Primary</span>
  <span class="badge badge-secondary">Secondary</span>
  <span class="badge badge-success">Success</span>
  <span class="badge badge-danger">Danger</span>
  <span class="badge badge-warning">Warning</span>
  <span class="badge badge-info">Info</span>
  <span class="badge badge-light">Light</span>
  <span class="badge badge-dark">Dark</span>

  <hr>

  <!-- Pill Badges -->
  <h4>Pill Badges</h4>
  <span class="badge badge-pill badge-primary">Primary</span>
  <span class="badge badge-pill badge-success">Success</span>
  <span class="badge badge-pill badge-danger">Danger</span>

  <hr>

  <!-- Badges in Buttons -->
  <h4>Badges in Buttons</h4>
  <button class="btn btn-primary">
    Messages <span class="badge badge-light">4</span>
  </button>

  <button class="btn btn-danger">
    Alerts <span class="badge badge-light">2</span>
  </button>

  <hr>

  <!-- Badges in Links -->
  <h4>Badges in Links</h4>
  <a href="#">Notifications <span class="badge badge-warning">5</span></a><br><br>
  <a href="#">Updates <span class="badge badge-success">10</span></a>

  <hr>

  <!-- Real UI Example -->
  <h4>Dashboard Example</h4>

  <button class="btn btn-success">
    Orders <span class="badge badge-light">12</span>
  </button>

  <button class="btn btn-info">
    Messages <span class="badge badge-light">7</span>
  </button>

  <button class="btn btn-danger">
    Errors <span class="badge badge-light">3</span>
  </button>

</body>
</html>
